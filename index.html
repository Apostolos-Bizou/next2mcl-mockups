<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Next2MCL — Sign in</title>
<meta name="robots" content="noindex, nofollow">
<script>window.__MCL_LOGIN__ = true;</script>
<script src="auth-guard.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{background:radial-gradient(1200px 720px at 50% -8%, #16456b, #071E33 60%);
       color:#EAF3F8;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:36px 18px;gap:34px}

  /* ---- BIG brand ---- */
  .hero{text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
  .mark{width:clamp(92px,20vw,148px);height:auto;filter:drop-shadow(0 10px 34px rgba(18,167,175,.45));animation:float 5s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .mark .pulse{stroke-dasharray:120;stroke-dashoffset:120;animation:draw 2.4s ease-in-out .3s forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .wm{font-size:clamp(46px,11vw,86px);font-weight:800;letter-spacing:-.035em;line-height:.92;
      text-shadow:0 6px 40px rgba(18,167,175,.25)}
  .wm .n{color:#FFFFFF}
  .wm .m{background:linear-gradient(180deg,#2ad0d8,#0E8C93);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tag{margin-top:4px;font-size:clamp(11px,2.4vw,14px);letter-spacing:.42em;text-transform:uppercase;
       color:#8FB4CE;font-weight:700}
  .rule{width:64px;height:4px;border-radius:3px;background:linear-gradient(90deg,#12A7AF,#E7A33E);margin-top:2px}

  /* ---- login card ---- */
  .card{width:min(92vw,360px);background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.1);
        border-radius:18px;padding:24px 24px 22px;box-shadow:0 24px 60px rgba(0,0,0,.42);backdrop-filter:blur(6px)}
  h1{font-size:15px;font-weight:700;margin:0 0 3px;text-align:center}
  .lead{font-size:12px;color:#9FBBD0;margin:0 0 18px;text-align:center}
  label{display:block;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:#7EA2BC;font-weight:700;margin:0 0 6px}
  .fld{margin-bottom:13px}
  input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:10px;
        padding:11px 13px;color:#EAF3F8;font-size:14px;font-family:inherit;outline:none;transition:.15s}
  input:focus{border-color:#12A7AF;background:rgba(255,255,255,.09)}
  input::placeholder{color:#5E7C93}
  .btn{width:100%;margin-top:6px;padding:12px;border:none;border-radius:10px;cursor:pointer;
       background:linear-gradient(100deg,#12A7AF,#0E8C93);color:#fff;font-size:14px;font-weight:700;font-family:inherit}
  .btn:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.6;cursor:default}
  .err{min-height:18px;margin-top:11px;font-size:12.5px;color:#F0776F;text-align:center;opacity:0;transition:.15s}
  .err.show{opacity:1}
  .lock{display:inline-flex;align-items:center;gap:5px;color:#5E7C93;font-size:10.5px;justify-content:center;width:100%;
        margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
  .lock svg{width:11px;height:11px}
  @media (prefers-reduced-motion:reduce){.mark{animation:none}.mark .pulse{animation:none;stroke-dashoffset:0}}
</style>
</head>
<body>
  <div class="hero">
    <svg class="mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1.5" y="1.5" width="37" height="37" rx="11" fill="#0B2A45" stroke="#12A7AF" stroke-width="1.6"/>
      <path class="pulse" d="M7 25 H13 L16.5 13 L22 28 L24.5 20 H33" stroke="#12A7AF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="8.5" r="2.6" fill="#E7A33E"/>
    </svg>
    <div class="wm"><span class="n">Next2</span><span class="m">MCL</span></div>
    <div class="tag">Maritime Care Lifecycle</div>
    <div class="rule"></div>
  </div>

  <form class="card" id="loginForm" autocomplete="on">
    <h1>Sign in</h1>
    <p class="lead">Enter your credentials to access the platform.</p>
    <div class="fld">
      <label for="u">Username</label>
      <input id="u" name="username" type="text" autocomplete="username" placeholder="username" autofocus>
    </div>
    <div class="fld">
      <label for="p">Password</label>
      <input id="p" name="password" type="password" autocomplete="current-password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;">
    </div>
    <button class="btn" id="btn" type="submit">Sign in &rarr;</button>
    <div class="err" id="err">Invalid username or password.</div>
    <span class="lock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>Restricted demo &middot; Next2Me Group</span>
  </form>
<script>
  const A = window.MCL_AUTH || {};
  try { if (sessionStorage.getItem("mcl_auth") === A.hash) location.replace("mcl-shell-v86.html"); } catch (e) {}
  async function sha256(str){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
  }
  const form = document.getElementById("loginForm");
  const err = document.getElementById("err");
  const btn = document.getElementById("btn");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    err.classList.remove("show");
    btn.disabled = true;
    const u = document.getElementById("u").value.trim();
    const p = document.getElementById("p").value;
    let h = "";
    try { h = await sha256(p); } catch (_) {}
    if (u === A.user && h === A.hash) {
      try { sessionStorage.setItem("mcl_auth", A.hash); } catch (_) {}
      location.replace("mcl-shell-v86.html");
    } else {
      btn.disabled = false;
      err.classList.add("show");
      document.getElementById("p").value = "";
      document.getElementById("p").focus();
    }
  });
</script>
</body>
</html>
