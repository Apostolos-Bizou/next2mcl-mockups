<!doctype html>
<html lang="en">
<head>
<script src="auth-guard.js"></script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Next2PostMed · Case Console (Mockup v92)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Public+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#26221E;--navy-2:#332C26;--teal:#1B7A6B;--teal-2:#26A08C;
  --gold:#C77D28;--gold-2:#DDA24E;--coral:#E5433A;--coral-2:#F16A5F;--coral-d:#B93129;
  --green:#3F8F52;--amber:#C77D28;--blue:#5B84A8;--violet:#8B4FA8;
  --mist:#F0EBE3;--paper:#FCFAF6;--panel:#FFFFFF;--ink:#22201C;--ink-2:#5B554C;--ink-3:#9A9187;
  --line:#E7DFD3;--line-2:#F2ECE3;--radius:14px;--radius-sm:9px;
  --shadow:0 1px 2px rgba(60,42,20,.05),0 8px 22px rgba(60,42,20,.07);--shadow-lg:0 16px 44px rgba(60,42,20,.16);
  --ff-display:'Bricolage Grotesque',system-ui,sans-serif;--ff-body:'Public Sans',system-ui,sans-serif;--ff-mono:'Space Mono',ui-monospace,monospace;
  --signal:#E5433A;
  --med:#1B7A6B;--leg:#8B4FA8;--fin:#C77D28;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:var(--ff-body);color:var(--ink);background:var(--mist);-webkit-font-smoothing:antialiased;line-height:1.45}
button{font-family:inherit;cursor:pointer;border:none;background:none}a{text-decoration:none;color:inherit}
:focus-visible{outline:2px solid var(--coral);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.mocktag{position:fixed;top:0;right:0;background:var(--coral);color:#fff;font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 10px;border-bottom-left-radius:8px;z-index:90;font-family:var(--ff-mono)}

/* topbar */
.topbar{background:var(--paper);border-bottom:3px solid var(--signal);padding:0 22px;height:64px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:40}
.brand{display:flex;align-items:center;gap:11px}
.brand .mark{width:38px;height:38px}
.brand .wm{font-family:var(--ff-display);font-weight:800;font-size:20px;color:var(--ink);line-height:1;letter-spacing:-.015em}
.brand .wm b{color:var(--signal)}
.brand .sub{font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-3);margin-top:3px;font-weight:700}
.mclhome{margin-left:6px;font-family:var(--ff-mono);font-size:11px;color:var(--ink-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;background:var(--panel)}
.mclhome:hover{border-color:var(--signal);color:var(--signal)}
.orgsel{margin-left:8px;display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 13px;font-size:13px;font-weight:600;color:var(--ink)}
.orgsel .dot{width:9px;height:9px;border-radius:3px;background:var(--signal)}
.orgsel svg{width:13px;height:13px;opacity:.45}
.search{margin-left:auto;display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 13px;width:230px;color:var(--ink-3)}
.search svg{width:15px;height:15px}
.search input{background:none;border:none;color:var(--ink);font-family:inherit;font-size:13px;width:100%}
.search input::placeholder{color:var(--ink-3)}.search input:focus{outline:none}
.langtog{display:inline-flex;background:var(--mist);border:1px solid var(--line);border-radius:8px;padding:2px}
.langtog button{padding:5px 10px;border-radius:6px;font-size:11.5px;font-weight:700;color:var(--ink-3)}
.langtog button.on{background:var(--signal);color:#fff}
.rolebadge{display:flex;align-items:center;gap:9px;padding-left:4px}
.rolebadge .av{width:36px;height:36px;border-radius:10px;background:var(--signal);color:#fff;display:grid;place-items:center;font-family:var(--ff-display);font-weight:700;font-size:12px}
.rolebadge .nm{font-size:12px;font-weight:700;line-height:1.2;color:var(--ink)}
.rolebadge .rl{font-size:10px;color:var(--ink-3)}

/* layout */
.shell{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 60px)}
.side{background:var(--paper);border-right:1px solid var(--line);padding:16px 12px;display:flex;flex-direction:column;gap:3px;position:sticky;top:60px;height:calc(100vh - 60px);overflow:auto}
.side .grp{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin:12px 8px 5px}
.nav{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;font-size:13px;font-weight:500;color:var(--ink-2)}
.nav svg{width:17px;height:17px;color:var(--ink-3)}
.nav:hover{background:var(--mist)}
.nav.on{background:linear-gradient(100deg,rgba(229,84,75,.12),rgba(229,84,75,.05));color:var(--coral-d);font-weight:600}
.nav.on svg{color:var(--coral)}
.nav .ct{margin-left:auto;font-family:var(--ff-mono);font-size:11px;background:var(--mist);color:var(--ink-3);padding:1px 7px;border-radius:6px}
.nav.on .ct{background:rgba(229,84,75,.14);color:var(--coral-d)}
.side .spacer{flex:1}
.side .guidebtn{border:1px solid var(--line);border-radius:10px;color:var(--ink-2)}
.side .guidebtn svg{color:var(--gold)}
.side .guidebtn.on{background:linear-gradient(100deg,rgba(231,163,62,.14),#fff);color:var(--ink);border-color:rgba(231,163,62,.4)}

.main{padding:22px 26px 70px;max-width:1180px}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.pagehead .ey{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--coral);font-weight:600;margin-bottom:5px}
.pagehead h1{font-family:var(--ff-display);font-weight:600;font-size:23px;letter-spacing:-.02em;margin:0}
.pagehead .rbac{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-3);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:6px 13px}
.pagehead .rbac svg{width:13px;height:13px;color:var(--coral)}

/* kpis */
.kpirow{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.kpi .k{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.kpi .v{font-family:var(--ff-display);font-weight:700;font-size:25px;margin-top:5px}
.kpi .d{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.kpi.warn .v{color:var(--coral-d)}.kpi.warn{border-color:rgba(229,84,75,.3);background:linear-gradient(180deg,rgba(229,84,75,.05),#fff)}

/* section head */
.sechead{display:flex;align-items:center;gap:10px;margin:6px 0 13px}
.sechead h2{font-family:var(--ff-display);font-size:15px;font-weight:600;margin:0}
.sechead .hint{font-size:12px;color:var(--ink-3);margin-left:auto}

/* ---- Batch 2: tabs + medical track + report reader ---- */
.dtabs{display:flex;gap:8px;margin-bottom:16px}
.dtab{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:11px;font-family:var(--ff-display);font-weight:600;font-size:13px;color:var(--ink-2);background:var(--paper);border:1px solid var(--line)}
.dtab svg{width:16px;height:16px;color:var(--ink-3)}
.dtab .c{font-family:var(--ff-mono);font-size:10.5px;background:var(--mist);color:var(--ink-3);padding:1px 7px;border-radius:6px;margin-left:2px}
.dtab.on{background:linear-gradient(100deg,var(--coral),var(--coral-d));color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(229,84,75,.24)}
.dtab.on svg{color:#fff}.dtab.on .c{background:rgba(255,255,255,.2);color:#fff}
.mgrid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start}
.rcard{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:.14s;border-left:3px solid var(--ink-3)}
.rcard:hover{box-shadow:0 6px 16px rgba(7,30,51,.09);transform:translateY(-1px)}
.rcard.r-imr{border-left-color:var(--blue)}.rcard.r-fur{border-left-color:var(--teal)}.rcard.r-fin{border-left-color:var(--coral)}
.rcard .rtop{display:flex;align-items:center;gap:8px}
.rcard .rbadge{font-family:var(--ff-display);font-weight:600;font-size:12.5px}
.rcard .rdate{margin-left:auto;font-family:var(--ff-mono);font-size:11px;color:var(--ink-3)}
.rcard .rline{font-size:12.5px;color:var(--ink-2);margin-top:7px}.rcard .rline b{color:var(--ink)}
.rcard .rmeta{display:flex;gap:16px;font-size:11.5px;color:var(--ink-3);margin-top:5px}.rcard .rmeta b{color:var(--ink-2);font-family:var(--ff-mono)}
.rcard .rfoot{display:flex;align-items:center;gap:9px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line-2)}
.rcard .rfoot .cd{font-family:var(--ff-mono);font-size:10px;color:var(--ink-3)}
.rcard .rfoot .open2{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--coral-d)}
.wr{font-size:9.5px;font-weight:700;font-family:var(--ff-mono);padding:1px 6px;border-radius:5px}
.wr-y{background:rgba(229,84,75,.12);color:var(--coral-d)}.wr-n{background:var(--mist);color:var(--ink-3)}
.racts{display:flex;gap:9px;margin-top:6px;flex-wrap:wrap}
.racts .btn{padding:9px 14px;font-size:12.5px}
.empty{font-size:12px;color:var(--ink-3);text-align:center;padding:14px 0}
.refrow{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px dashed var(--line-2)}
.refrow:last-child{border-bottom:none}
.refrow .rfic{width:26px;height:26px;flex:0 0 26px;border-radius:8px;display:grid;place-items:center;background:var(--mist);color:var(--ink-3)}
.refrow .rfic svg{width:14px;height:14px}
.refrow.ok .rfic{background:rgba(47,163,107,.14);color:var(--green)}
.refrow .rfn{font-size:12.5px;font-weight:600}
.refrow .rft{margin-left:auto;font-size:11px;color:var(--ink-3);font-family:var(--ff-mono)}
.fitset{border-radius:12px;padding:14px;text-align:center}
.fitset.ftw,.fitset.fly,.fitset.rep{background:rgba(47,163,107,.09);border:1px solid rgba(47,163,107,.28)}
.fitset.unfit,.fitset.contested{background:rgba(123,97,168,.09);border:1px solid rgba(123,97,168,.3)}
.fitset .fitv{font-family:var(--ff-display);font-weight:700;font-size:17px;color:var(--ink)}
.fitset.ftw .fitv,.fitset.fly .fitv,.fitset.rep .fitv{color:var(--green)}
.fitset.unfit .fitv,.fitset.contested .fitv{color:var(--violet)}
.fitset .fitsub{font-size:11.5px;color:var(--ink-3);margin-top:4px}
.fitpick{display:flex;flex-direction:column;gap:8px}
.fitpick .fithint{font-size:11.5px;color:var(--ink-3);margin-bottom:2px}
.fitb{padding:10px;border-radius:10px;border:1px solid var(--line);font-weight:600;font-size:12.5px;color:var(--ink-2);background:var(--paper);text-align:left}
.fitb:hover{border-color:var(--green);color:var(--green)}
.fitb.ub:hover{border-color:var(--violet);color:var(--violet)}
.report{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);max-width:820px;padding:26px 30px;margin:0 auto}
.report .rhead{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;padding-bottom:16px;border-bottom:2px solid var(--navy)}
.report .rbrand{font-family:var(--ff-display);font-weight:700;font-size:17px;color:var(--navy)}
.report .rbrand b{color:var(--coral)}
.report .rsub{font-size:12px;color:var(--ink-3);margin-top:4px;font-family:var(--ff-mono)}
.report .rstamp{text-align:right}.report .rstamp .cd{font-family:var(--ff-mono);font-size:11px;color:var(--ink-2);font-weight:600}.report .rstamp .rev{font-size:10.5px;color:var(--ink-3);margin-top:3px}
.report .rgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 22px;margin:16px 0 6px}
.report .rf{font-size:12.5px;color:var(--ink);border-bottom:1px solid var(--line-2);padding-bottom:6px}
.report .rf .rl{display:block;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:2px}
.report .rsec{margin-top:16px}
.report .rsec h4{font-family:var(--ff-display);font-size:12px;letter-spacing:.03em;text-transform:uppercase;color:var(--coral-d);margin:0 0 5px}
.report .rsec p{font-size:13px;color:var(--ink-2);margin:0;line-height:1.5}
.report .rsec.cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.report .rsec .big{font-family:var(--ff-display);font-weight:700;font-size:22px;color:var(--ink)}.report .rsec .big small{font-size:12px;color:var(--ink-3);font-weight:500}
.report .rsec.fit{background:var(--mist);border-radius:12px;padding:14px 16px}
.report .rfootr{margin-top:22px;padding-top:14px;border-top:1px solid var(--line-2);font-size:11px;color:var(--ink-3);display:flex;align-items:center;gap:8px}
.report .rfootr .nocopy{font-size:9px;font-weight:700;font-family:var(--ff-mono);color:var(--coral-d);background:rgba(229,84,75,.1);border:1px solid rgba(229,84,75,.3);padding:2px 6px;border-radius:5px}
@media (max-width:940px){.mgrid{grid-template-columns:1fr}.report{padding:20px 18px}.report .rgrid,.report .rsec.cols{grid-template-columns:1fr}}
/* ---- Analysis section (year-end deck) ---- */
.anatabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;border-bottom:1px solid var(--line);padding-bottom:2px}
.anatab{padding:8px 13px;border-radius:9px 9px 0 0;font-family:var(--ff-display);font-weight:600;font-size:12.5px;color:var(--ink-3);border:1px solid transparent;border-bottom:none}
.anatab:hover{color:var(--ink)}
.anatab.on{color:var(--signal);background:var(--panel);border-color:var(--line);border-bottom:2px solid var(--signal);margin-bottom:-1px}
.chapterhead{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.chapterhead h2{font-family:var(--ff-display);font-weight:800;font-size:20px;letter-spacing:-.01em;margin:0}
.chapterhead span{font-family:var(--ff-mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--signal);border-radius:11px;padding:12px 14px;box-shadow:var(--shadow)}
.stat .sk{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.stat .sv{font-family:var(--ff-display);font-weight:800;font-size:26px;line-height:1.05;margin-top:4px;color:var(--ink)}
.stat .ss{font-size:11px;color:var(--ink-3);margin-top:3px}
.anacols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;align-items:start}
.leg2{display:flex;flex-direction:column;gap:9px}
.leg2 .it{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-2)}
.leg2 .it .sw{width:11px;height:11px;border-radius:3px}
.leg2 .it b{margin-left:auto;font-family:var(--ff-display);font-weight:800;color:var(--ink)}
.dtable{overflow-x:auto}
.dtable table{width:100%;border-collapse:collapse;font-size:12.5px}
.dtable th{text-align:left;font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);font-weight:700;padding:8px 10px;border-bottom:2px solid var(--line)}
.dtable td{padding:8px 10px;border-bottom:1px solid var(--line-2);color:var(--ink-2)}
.dtable td:first-child{font-weight:600;color:var(--ink)}
.dtable th.num,.dtable td.num{text-align:right;font-family:var(--ff-mono)}
.dtable tr.tot td{font-weight:800;color:var(--ink);border-top:2px solid var(--line);border-bottom:none;background:var(--mist)}
.freq{display:flex;flex-direction:column;gap:9px}
.frow{display:grid;grid-template-columns:132px 1fr 64px;align-items:center;gap:14px}
.frow .flabel{font-size:12.5px;font-weight:600;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frow.lead .flabel{color:var(--signal);font-weight:700}
.frow .ftrack{background:var(--mist);border-radius:8px;height:26px;overflow:hidden}
.frow .ffill{height:100%;border-radius:8px;min-width:8px;box-shadow:inset 0 1px 0 rgba(255,255,255,.25);transition:width .6s cubic-bezier(.2,.8,.2,1)}
.frow .fval{text-align:right;font-family:var(--ff-display);font-weight:800;font-size:20px;color:var(--ink);line-height:1}
.frow .fval span{display:block;font-family:var(--ff-mono);font-weight:400;font-size:10px;color:var(--ink-3);margin-top:2px}
.frow.lead .fval{color:var(--signal)}
@media (max-width:560px){.frow{grid-template-columns:96px 1fr 52px;gap:9px}.frow .fval{font-size:17px}}
.ananote{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--med);border-radius:11px;padding:12px 15px;font-size:12.5px;color:var(--ink-2);line-height:1.5;margin-top:6px}
.planlist{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.plan{display:flex;gap:13px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow)}
.plan .pn{width:30px;height:30px;flex:0 0 30px;border-radius:9px;background:var(--signal);color:#fff;display:grid;place-items:center;font-family:var(--ff-display);font-weight:800;font-size:14px}
.plan .pt{font-family:var(--ff-display);font-weight:700;font-size:14px}
.plan .pd{font-size:12.5px;color:var(--ink-2);margin-top:2px}
@media (max-width:940px){.statgrid{grid-template-columns:1fr 1fr}.anacols{grid-template-columns:1fr}}
/* dashboard analytics */
.dashgrid{display:grid;grid-template-columns:1.55fr 1fr;gap:14px;margin-bottom:14px}
.pcard{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px}
.pcard .ph{display:flex;align-items:center;gap:9px;margin-bottom:13px}
.pcard .ph .zn{font-family:var(--ff-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:5px}
.zn.legal{background:rgba(123,97,168,.14);color:var(--violet)}.zn.intel{background:rgba(14,140,147,.12);color:var(--teal)}.zn.trend{background:rgba(229,84,75,.13);color:var(--coral-d)}
.pcard .ph h3{font-family:var(--ff-display);font-size:13.5px;font-weight:600;margin:0}
.pcard .ph .rt{margin-left:auto;font-size:11px;color:var(--ink-3);font-family:var(--ff-mono)}
.pfolio{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--signal);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.pfolio::after{content:"";position:absolute;right:-40px;top:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(229,67,58,.07),transparent 70%);pointer-events:none}
.pfolio .lbl{display:inline-block;font-family:var(--ff-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--signal);font-weight:700;padding:4px 11px;border-radius:7px}
.pfolio .flex{display:flex;gap:24px;align-items:center;margin-top:14px;position:relative;z-index:1;flex-wrap:wrap}
.pfolio .big{font-family:var(--ff-display);font-weight:800;font-size:54px;line-height:.95;letter-spacing:-.03em;color:var(--ink)}
.pfolio .big small{display:block;font-size:10.5px;color:var(--ink-3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:7px}
.pfolio .leg{display:flex;flex-direction:column;gap:8px}
.pfolio .leg .it{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2);min-width:150px}
.pfolio .leg .sw{width:10px;height:10px;border-radius:3px}
.pfolio .leg .n{font-family:var(--ff-display);font-weight:800;color:var(--ink);margin-left:auto}
.pfolio .strip{display:flex;gap:20px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);position:relative;z-index:1;flex-wrap:wrap}
.pfolio .strip .it .k{font-size:9.5px;color:var(--ink-3);letter-spacing:.05em;text-transform:uppercase;font-weight:600}
.pfolio .strip .it .v{font-family:var(--ff-display);font-weight:800;font-size:19px;color:var(--ink);margin-top:2px}
.pfolio .strip .it .v small{font-size:11px;color:var(--ink-3);font-weight:500}
.legalstat .big{font-family:var(--ff-display);font-weight:700;font-size:36px;color:var(--violet);line-height:1}
.legalstat .big small{font-size:12px;color:var(--ink-3);font-weight:500;margin-left:4px}
.lbar{display:flex;flex-direction:column;gap:11px;margin-top:15px}
.lbar .row{display:flex;align-items:center;gap:10px;font-size:12px}
.lbar .row .lb{flex:0 0 118px;color:var(--ink-2)}
.lbar .row .tr{flex:1;height:10px;background:var(--mist);border-radius:6px;overflow:hidden}
.lbar .row .fill{height:100%;border-radius:6px}
.lbar .row .n{font-family:var(--ff-mono);font-size:11.5px;font-weight:600;color:var(--ink);flex:0 0 24px;text-align:right}
.chartrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px}
.hbars{display:flex;flex-direction:column;gap:7px}
.hbar{display:flex;align-items:center;gap:9px;font-size:11.5px}
.hbar .lb{flex:0 0 40px;color:var(--ink-2);font-weight:600}
.hbar .tr{flex:1;height:13px;background:var(--mist);border-radius:5px;overflow:hidden}
.hbar .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--teal),var(--teal-2))}
.hbar .n{flex:0 0 22px;text-align:right;font-family:var(--ff-mono);font-size:11px;color:var(--ink-3)}
.vbars{display:flex;align-items:flex-end;gap:7px;height:118px;padding-top:6px}
.vb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.vb .n{font-family:var(--ff-mono);font-size:10px;color:var(--ink-3)}
.vb .col{width:100%;max-width:30px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--coral-2),var(--coral-d));min-height:4px;transition:.2s}
.vb .lb{font-size:9px;color:var(--ink-3);text-align:center;line-height:1.15}
.trendwrap svg{width:100%;display:block;height:118px}
.livehd{display:flex;align-items:baseline;gap:10px;margin:4px 2px 12px}
.livehd h2{font-family:var(--ff-display);font-size:15px;font-weight:600;margin:0}
.livehd .sub{font-size:12px;color:var(--ink-3)}
@media (max-width:940px){.dashgrid,.chartrow{grid-template-columns:1fr}}
/* board table */
.tablewrap{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.tbtools{display:flex;align-items:center;gap:9px;padding:12px 15px;border-bottom:1px solid var(--line-2);flex-wrap:wrap}
.chip{font-size:12px;font-weight:600;color:var(--ink-2);background:var(--mist);border:1px solid var(--line);padding:6px 12px;border-radius:999px}
.chip.on{background:var(--coral);color:#fff;border-color:var(--coral)}
.tbtools .rt{margin-left:auto;font-size:11.5px;color:var(--ink-3)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);font-weight:600;padding:10px 14px;border-bottom:1px solid var(--line-2);white-space:nowrap}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tbody tr{cursor:pointer;transition:.12s}
tbody tr:hover{background:var(--mist)}
tbody tr:last-child td{border-bottom:none}
.cid{font-family:var(--ff-mono);font-size:11.5px;color:var(--coral-d);font-weight:600}
.sf .nm{font-weight:600}.sf .mt{font-size:10.5px;color:var(--ink-3);font-family:var(--ff-mono)}
.tag{font-size:10px;font-weight:700;letter-spacing:.03em;padding:2px 8px;border-radius:6px;font-family:var(--ff-mono);white-space:nowrap;display:inline-block}
.t-ill{background:rgba(91,141,184,.14);color:#3F6C93}.t-inj{background:rgba(229,84,75,.13);color:var(--coral-d)}.t-death{background:#2b2b2b;color:#fff}
.sys{font-size:10.5px;font-weight:600;color:var(--ink-2);background:var(--mist);border:1px solid var(--line);padding:2px 7px;border-radius:6px}
.stg{font-size:11.5px;color:var(--ink-2)}
.stg .dotrow{display:inline-flex;gap:2px;margin-right:6px;vertical-align:middle}
.stg .d{width:5px;height:5px;border-radius:50%;background:var(--line)}
.stg .d.med{background:var(--med)}.stg .d.leg{background:var(--leg)}.stg .d.fin{background:var(--fin)}
.clock{display:inline-flex;align-items:center;gap:6px;font-family:var(--ff-mono);font-size:11.5px;font-weight:600}
.clock .ring{width:22px;height:22px;flex:0 0 22px}
.clock.ok{color:var(--green)}.clock.warn{color:var(--amber)}.clock.crit{color:var(--coral-d)}
.st{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px}
.st.open{background:rgba(217,144,42,.14);color:var(--amber)}.st.closed{background:rgba(47,163,107,.13);color:var(--green)}.st.legal{background:rgba(123,97,168,.14);color:var(--violet)}

/* ===== case detail ===== */
.back{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--coral-d);margin-bottom:12px}
.back svg{width:15px;height:15px}
.casehdr{background:linear-gradient(125deg,#2A2521,var(--navy-2) 55%,#3A322A);border-radius:var(--radius);color:#EAF3F8;padding:20px 22px;position:relative;overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
.casehdr::after{content:"";position:absolute;right:-50px;top:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(229,67,58,.28),transparent 66%);pointer-events:none}
.casehdr .top{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;position:relative;z-index:1}
.casehdr .sfname{font-family:var(--ff-display);font-weight:700;font-size:22px}
.casehdr .meta{font-size:12.5px;color:#B9D3E4;margin-top:4px;display:flex;gap:14px;flex-wrap:wrap}
.casehdr .meta b{color:#EAF3F8;font-weight:600}
.casehdr .ids{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:6px}
.idchip{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:6px 11px;font-family:var(--ff-mono);font-size:11.5px}
.idchip .l{color:#7EA2BC;font-size:9px;letter-spacing:.1em;text-transform:uppercase}
.idchip .v{color:#fff;font-weight:600}
.casehdr .clocks{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;position:relative;z-index:1}
.clk{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:11px;min-width:150px}
.clk .ring{width:38px;height:38px;flex:0 0 38px}
.clk .lb{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#7EA2BC;font-weight:600}
.clk .vl{font-family:var(--ff-display);font-weight:700;font-size:16px;color:#fff;margin-top:1px}
.clk .sb{font-size:10px;color:#9FBBD0;font-family:var(--ff-mono)}

/* track rail — signature */
.rail{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:6px 4px 10px;margin-bottom:16px}
.trk{padding:13px 18px;border-bottom:1px solid var(--line-2)}
.trk:last-child{border-bottom:none}
.trk .th{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.trk .th .dot{width:10px;height:10px;border-radius:3px}
.trk.med .th .dot{background:var(--med)}.trk.leg .th .dot{background:var(--leg)}.trk.fin .th .dot{background:var(--fin)}
.trk .th .nm{font-family:var(--ff-display);font-size:13px;font-weight:600}
.trk .th .sub{font-size:11px;color:var(--ink-3);margin-left:2px}
.trk .th .pct{margin-left:auto;font-family:var(--ff-mono);font-size:11px;color:var(--ink-3)}
.steps{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding-bottom:4px}
.step{flex:0 0 auto;min-width:96px;position:relative;padding:0 4px;text-align:center}
.step .node{width:20px;height:20px;border-radius:50%;margin:0 auto 7px;background:var(--paper);border:2px solid var(--line);display:grid;place-items:center;position:relative;z-index:1}
.step .node svg{width:11px;height:11px;color:#fff}
.step::before{content:"";position:absolute;top:9px;left:-50%;width:100%;height:2px;background:var(--line)}
.step:first-child::before{display:none}
.step .lab{font-size:10.5px;line-height:1.25;color:var(--ink-3);padding:0 3px}
.step.done .node{background:var(--tc);border-color:var(--tc)}
.step.done::before{background:var(--tc)}
.step.cur .node{background:#fff;border-color:var(--tc);box-shadow:0 0 0 4px var(--tcl)}
.step.cur .lab{color:var(--ink);font-weight:600}
.step.cur::before{background:var(--tc)}
.step.esc .node{border-color:var(--violet)}.step.esc.cur .node{box-shadow:0 0 0 4px rgba(123,97,168,.16)}
.trk.med{--tc:var(--med);--tcl:rgba(14,140,147,.16)}
.trk.leg{--tc:var(--leg);--tcl:rgba(217,144,42,.18)}
.trk.fin{--tc:var(--fin);--tcl:rgba(47,163,107,.16)}

/* detail grid */
.dgrid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.panel .ph{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line-2)}
.panel .ph .ic{width:28px;height:28px;border-radius:8px;background:var(--mist);display:grid;place-items:center;color:var(--coral);flex:0 0 28px}
.panel .ph .ic svg{width:15px;height:15px}
.panel .ph h3{font-family:var(--ff-display);font-size:13.5px;font-weight:600;margin:0}
.panel .ph .rt{margin-left:auto;font-size:11px;color:var(--ink-3);font-family:var(--ff-mono)}
.panel .pb{padding:14px 16px}
.kv{display:flex;gap:12px;padding:8px 0;border-bottom:1px dashed var(--line-2);font-size:12.5px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--ink-3);flex:0 0 132px}
.kv .v{color:var(--ink);font-weight:500}
.kv .v .mono{font-family:var(--ff-mono);font-size:11.5px}

/* hospital selection inside case */
.hosel .opt{display:flex;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;transition:.14s;cursor:pointer}
.hosel .opt:hover{border-color:var(--coral);box-shadow:0 4px 14px rgba(229,84,75,.1)}
.hosel .opt.sel{border-color:var(--coral);background:rgba(229,84,75,.04)}
.hosel .opt .av{width:40px;height:40px;flex:0 0 40px;border-radius:10px;background:linear-gradient(135deg,var(--navy-2),var(--teal));color:#fff;display:grid;place-items:center;font-family:var(--ff-display);font-weight:700;font-size:13px}
.hosel .opt .nm{font-weight:600;font-size:13px}
.hosel .opt .lo{font-size:11px;color:var(--ink-3);margin-top:2px}
.hosel .opt .tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.avl{font-size:9.5px;font-weight:700;font-family:var(--ff-mono);padding:2px 7px;border-radius:5px}
.avl.free{background:rgba(47,163,107,.13);color:var(--green)}.avl.ltd{background:rgba(217,144,42,.15);color:var(--amber)}.avl.full{background:var(--mist);color:var(--ink-3)}
.spec{font-size:9.5px;color:var(--ink-2);background:var(--mist);border:1px solid var(--line);padding:2px 7px;border-radius:5px}
.hosel .opt .rt{margin-left:auto;text-align:right}
.hosel .opt .cost{font-family:var(--ff-mono);font-size:12px;font-weight:600;color:var(--ink)}
.hosel .opt .costl{font-size:9.5px;color:var(--ink-3)}
.hosel .opt .dist{font-size:10.5px;color:var(--ink-3);margin-top:4px}

/* doc chips / comm log */
.doc{display:flex;align-items:center;gap:11px;padding:10px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px}
.doc .fi{width:34px;height:34px;flex:0 0 34px;border-radius:9px;background:var(--mist);display:grid;place-items:center;color:var(--navy-2)}
.doc .fi svg{width:16px;height:16px}
.doc .nm{font-size:12.5px;font-weight:600}
.doc .cd{font-family:var(--ff-mono);font-size:10.5px;color:var(--ink-3);margin-top:1px}
.doc .rt{margin-left:auto;display:flex;align-items:center;gap:8px}
.doc .nocopy{font-size:9px;font-weight:700;font-family:var(--ff-mono);color:var(--coral-d);background:rgba(229,84,75,.1);border:1px solid rgba(229,84,75,.3);padding:2px 6px;border-radius:5px}
.doc .dmslink{font-size:11px;font-weight:600;color:var(--teal)}
.log{position:relative;padding-left:20px}
.log .ev{position:relative;padding:0 0 14px 14px;border-left:2px solid var(--line-2)}
.log .ev:last-child{border-left-color:transparent;padding-bottom:0}
.log .ev::before{content:"";position:absolute;left:-6px;top:2px;width:10px;height:10px;border-radius:50%;background:var(--coral);border:2px solid #fff}
.log .ev.sys::before{background:var(--teal)}
.log .t{font-size:11px;color:var(--ink-3);font-family:var(--ff-mono)}
.log .m{font-size:12.5px;color:var(--ink-2);margin-top:2px}.log .m b{color:var(--ink)}
.log .who{font-size:10.5px;color:var(--ink-3)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;border-radius:11px;font-family:var(--ff-display);font-weight:600;font-size:13px;transition:.14s}
.btn svg{width:16px;height:16px}
.btn.primary{background:linear-gradient(100deg,var(--coral),var(--coral-d));color:#fff;box-shadow:0 6px 18px rgba(229,84,75,.28)}
.btn.primary:hover{transform:translateY(-1px)}
.btn.ghost{border:1px solid var(--line);color:var(--ink-2)}.btn.ghost:hover{background:var(--mist)}
.btn.full{width:100%}

/* intake */
.intake{max-width:760px}
.chanrow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.chansel{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:15px;text-align:left;transition:.14s}
.chansel:hover{border-color:var(--coral)}
.chansel.on{border-color:var(--coral);background:rgba(229,84,75,.04);box-shadow:0 6px 18px rgba(229,84,75,.1)}
.chansel .ic{width:34px;height:34px;border-radius:10px;background:var(--mist);display:grid;place-items:center;color:var(--coral);margin-bottom:9px}
.chansel .ic svg{width:18px;height:18px}
.chansel .t{font-family:var(--ff-display);font-weight:600;font-size:13px}
.chansel .d{font-size:11px;color:var(--ink-3);margin-top:3px}
.form{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fld{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fld.full{grid-column:1/-1}
.fld label{font-size:11.5px;font-weight:600;color:var(--ink-2)}
.fld label .req{color:var(--coral)}
.fld input,.fld select,.fld textarea{padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:13px;color:var(--ink);background:#fff}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--coral);box-shadow:0 0 0 3px rgba(229,84,75,.1)}
.fld .hint{font-size:10.5px;color:var(--ink-3)}
.forced{display:flex;gap:9px;background:rgba(217,144,42,.08);border:1px solid rgba(217,144,42,.28);border-radius:11px;padding:11px 13px;font-size:12px;color:#8a5a12;margin:4px 0 16px}
.forced svg{width:16px;height:16px;flex:0 0 16px;color:var(--amber);margin-top:1px}
/* legal + financial deep tabs */
.dcline{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px dashed var(--line-2)}
.dcline:last-child{border-bottom:none}
.dcline .dck{flex:0 0 128px}.dcline .dck b{font-size:12px;color:var(--ink);display:block}.dcline .dck small{font-size:10.5px;color:var(--ink-3)}
.dctrack{flex:1;height:8px;border-radius:6px;background:var(--line-2);overflow:hidden;position:relative}
.dctrack .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px}
.dcline .dcn{flex:0 0 auto;font-family:var(--ff-mono);font-size:11px;font-weight:700;min-width:70px;text-align:right}
.st-ok{color:var(--green)}.st-warn{color:var(--amber)}.st-crit{color:var(--coral-d)}
.bg-ok{background:var(--green)}.bg-warn{background:var(--amber)}.bg-crit{background:var(--coral-d)}.bg-mut{background:var(--ink-3)}
.verdict{border-radius:11px;padding:11px 13px;font-size:12px;margin:2px 0 12px;display:flex;gap:9px;align-items:flex-start}
.verdict svg{width:16px;height:16px;flex:0 0 16px;margin-top:1px}
.verdict b{font-weight:700}
.verdict.ok{background:rgba(47,163,107,.09);border:1px solid rgba(47,163,107,.28);color:#1f6b3f}.verdict.ok svg{color:var(--green)}
.verdict.warn{background:rgba(217,144,42,.08);border:1px solid rgba(217,144,42,.28);color:#8a5a12}.verdict.warn svg{color:var(--amber)}
.verdict.crit{background:rgba(229,67,58,.08);border:1px solid rgba(229,67,58,.3);color:var(--coral-d)}.verdict.crit svg{color:var(--coral-d)}
.propflag{font-family:var(--ff-mono);font-size:9px;font-weight:700;letter-spacing:.02em;color:#6b4fa0;background:rgba(139,79,168,.1);border:1px solid rgba(139,79,168,.3);padding:2px 6px;border-radius:5px;white-space:nowrap}
.propflag.rp{color:#2f7d64;background:rgba(47,125,100,.1);border-color:rgba(47,125,100,.32)}
.basis{display:flex;gap:8px;align-items:flex-start;margin-top:12px;padding:9px 11px;background:var(--paper);border:1px dashed var(--line);border-radius:9px;font-size:11px;color:var(--ink-2);line-height:1.45}
.basis svg{width:15px;height:15px;flex:0 0 auto;color:var(--ink-3);margin-top:1px}
.basis a{color:inherit}
.vsheet{display:inline-flex;align-items:center;gap:7px;margin-top:9px;padding:8px 12px;font-size:12px;font-weight:600;color:#2f7d64;background:rgba(47,125,100,.08);border:1px solid rgba(47,125,100,.28);border-radius:9px;text-decoration:none}
.vsheet svg{width:15px;height:15px;flex:0 0 auto}
.vsheet:hover{background:rgba(47,125,100,.15);border-color:rgba(47,125,100,.45)}
.win{display:flex;gap:12px;padding:12px 0;border-bottom:1px dashed var(--line-2)}
.win:last-child{border-bottom:none}
.win .wn{width:26px;height:26px;flex:0 0 26px;border-radius:8px;display:grid;place-items:center;font-family:var(--ff-display);font-weight:700;font-size:12px;background:var(--mist);color:var(--ink-3)}
.win.done .wn{background:rgba(47,163,107,.14);color:var(--green)}
.win.active .wn{background:rgba(139,79,168,.16);color:var(--violet)}
.win .wb{flex:1;min-width:0}
.win .wt{font-size:12.5px;font-weight:600;color:var(--ink);display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.win .wd{font-size:11px;color:var(--ink-3);margin-top:3px;line-height:1.4}
.win .wc{margin-left:auto;text-align:right;font-family:var(--ff-mono);font-size:10px;color:var(--ink-3);flex:0 0 auto;padding-left:6px}
.win .wc .big{font-size:13px;font-weight:700;display:block}
.btn.mini{padding:8px 12px;font-size:11.5px}
.chk{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.chk span{font-size:10px;font-weight:600;color:#1f6b3f;background:rgba(47,163,107,.1);border:1px solid rgba(47,163,107,.26);padding:2px 7px;border-radius:6px}
.varbar{height:28px;border-radius:8px;background:var(--line-2);position:relative;overflow:hidden;margin:10px 0 4px}
.varbar .est{position:absolute;top:0;bottom:0;left:0;background:rgba(27,122,107,.16);border-right:2px dashed var(--teal)}
.varbar .act{position:absolute;top:0;bottom:0;left:0;background:linear-gradient(90deg,rgba(199,125,40,.55),rgba(199,125,40,.3))}
.varbar .vl{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-family:var(--ff-mono);font-size:10.5px;font-weight:700;color:var(--ink)}

.stampsig .sg b{display:block;font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:2px}
.lgdoc .rsec.plum h4{color:var(--violet)}.lgdoc .rsec.ochre h4{color:var(--gold)}

.hcard .nm{font-family:var(--ff-display);font-weight:600;font-size:14px}

.hcard .lo svg{width:12px;height:12px}
.hcard .body{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.hcard .specs{display:flex;gap:5px;flex-wrap:wrap}

function trackRow(cls,key,sub,stagesEN,stagesEL,curIdx,pct){
 const stg=lang==="el"?stagesEL:stagesEN;
 const steps=stg.map((s,i)=>{
   const st=i<curIdx?"done":i===curIdx?"cur":"";
   const esc=(cls==="leg"&&escStages.has(i))?" esc":"";
   const ic=i<curIdx?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5 9-11"/></svg>`:"";
   return `<div class="step ${st}${esc}"><div class="node">${ic}</div><div class="lab">${s}</div></div>`;
 }).join("");
 return `<div class="trk ${cls}"><div class="th"><span class="dot"></span><span class="nm">${t("trk."+key)}</span><span class="sub">${t("trk."+key+".s")}</span><span class="pct">${pct}%</span></div><div class="steps">${steps}</div></div>`;
}

const ESTIMATE={MSK:{len:"45–90",cost:"$12K–$28K"},GI:{len:"20–45",cost:"$6K–$18K"},CV:{len:"60–120",cost:"$18K–$40K"},GU:{len:"20–40",cost:"$5K–$14K"},INTG:{len:"14–30",cost:"$3K–$9K"},NEUR:{len:"90–180",cost:"$25K–$60K"},_:{len:"30–60",cost:"$8K–$20K"}};
const TESTS_C={MSK:"MRI, X-ray, CBC",GI:"Endoscopy, ultrasound, CBC",CV:"ECG, echo, troponin",GU:"CT-KUB, urinalysis, CBC",INTG:"Skin biopsy, CBC",_:"Imaging, labs, CBC"};
function physFor(c){return c.hospital?"Dr. A. Reyes, M.D.":"Dr. M. Santos, M.D.";}
function estFor(c){return ESTIMATE[c.sys]||ESTIMATE._;}
function makeReport(c,type,no,day){const e=estFor(c),code={IMR:"IMR",FUR:"FUR"+no,FINAL:"CFMA"}[type];return {rid:type+no,type,no,day,dx:c.dx,wr:c.wr,estLen:e.len,estCost:e.cost,tests:TESTS_C[c.sys]||TESTS_C._,note:"",dms:"MCL-MAR-POST-"+code+"-2026-"+("000000"+c.seq).slice(-6)};}
function seedReports(c){
 if(c.reports)return;
 c.reports=[];
 if(c.stg.med>=3)c.reports.push(makeReport(c,"IMR",1,7));
 if(c.stg.med>=5)c.reports.push(makeReport(c,"FUR",1,21));
 if(c.stg.med>=6)c.reports.push(makeReport(c,"FUR",2,45));
 if(c.stg.med>=6)c.reports.push(makeReport(c,"FINAL",1,92));
 const sp=SPECIALTY[c.sys];
 c.referrals=sp?[{spec:sp,day:5,done:c.stg.med>=3}]:[];
 if(c.sys==="CV")c.referrals.push({spec:SPECIALTY.NEUR,day:9,done:c.stg.med>=4});
 if(c.sys==="GI"&&c.type==="ill")c.referrals.push({spec:{en:"General Surgery",el:"Γενική Χειρουργική"},day:8,done:c.stg.med>=4});
 c.fitness=c.stg.med>=7?(c.status==="legal"?"contested":"ftw"):null;
}

function saveReport(){
 const c=curCase;
 if(formType==="FINAL"){const fit=$("#rf_fit").value;c.fitness=fit;c.stg.med=7;if(c.stg.leg<1)c.stg.leg=1;c.reports.push(makeReport(c,"FINAL",1,daysSince(c.arr)));if(fit==="unfit")c.stg.leg=Math.max(c.stg.leg,2);backToMedical();toast(t("toast.final"));return;}
 const dx=$("#rf_dx").value.trim(),len=$("#rf_len").value.trim(),cost=$("#rf_cost").value.trim();
 if(!dx||!len||!cost){toast(t("rep.reqmiss"));return;}
 const no=c.reports.filter(r=>r.type==="FUR").length+1;
 const r=makeReport(c,"FUR",no,daysSince(c.arr));r.dx=dx;r.estLen=len;r.estCost=cost;r.note=$("#rf_note").value.trim();
 c.reports.push(r);
 if(c.stg.med<5)c.stg.med=5;else if(c.stg.med<6&&no>=2)c.stg.med=6;
 backToMedical();toast(t("toast.fur"));
}

const _icOK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12l5 5 9-11"/></svg>';

function ensureLeg(c){
 if(c.leg)return c.leg;
 const s=c.stg.leg, isLegal=c.status==='legal';
 const L={cfmaInterim:false,contested:(isLegal||s>=3),contestDay:null,assented:s>=4,assentDay:null,thirdAppointed:s>=4,apptDay:null,thirdDecided:false,decideDay:null,ext240:false,qma:false,swrr:false,nlrc:s>=5,closed:s>=7};
 if(L.contested)L.contestDay=(c.id==='PM-2026-0033')?61:daysSince(c.arr);
 if(L.assented)L.assentDay=(c.id==='PM-2026-0033')?69:(L.contestDay!=null?L.contestDay+6:daysSince(c.arr));
 if(L.thirdAppointed)L.apptDay=(c.id==='PM-2026-0033')?82:(L.assentDay!=null?L.assentDay+9:daysSince(c.arr));
 c.leg=L;return L;
}
function ensureMoney(c){
 if(c.money)return c.money;
 const wage={Captain:2600,"Chief Engineer":2500,"2nd Engineer":1900,"3rd Engineer":1500,"Chief Mate":2000,Bosun:1250,AB:1050,"Deck Cadet":600,Oiler:1150,OS:950}[c.sf.rank]||1200;
 const s=c.stg.fin;
 c.money={wage,approved:s>=2,gop:!!c.hospital,sickMonths:Math.min(Math.floor(daysSince(c.arr)/30),4),settled:s>=5,amount:0,closed:s>=6};
 return c.money;
}
function money(n){return "$"+Math.round(n).toLocaleString("en-US");}
function estMid(c){const m=(estFor(c).cost.match(/\d+/g)||["15","30"]).map(Number);const lo=m[0]*1000,hi=(m[1]||m[0])*1000;return {lo,hi,mid:(lo+hi)/2};}
function winMeta(elapsed,limit){const left=limit-elapsed;const st=left<0?"crit":left<=2?"crit":left<=5?"warn":"ok";const txt=left<0?t("lg.over"):elapsed+" "+t("lg.win.of")+" "+limit+t("lg.win.d");return {st,left,txt};}

function legalTab(c){
 const L=ensureLeg(c), d=daysSince(c.arr);
 const fr=(c.reports||[]).find(r=>r.type==="FINAL"), finalDay=fr?fr.day:null;
 const hasCFMA=!!fr && !!c.fitness, cfmaDef=hasCFMA && !L.cfmaInterim;
 const cs120=clockState(d,120), cs240=clockState(d,240), left120=120-d, left240=240-d, seq=c.seq;
 const bar=(k,kd,pct,state,num)=>`<div class="dcline"><div class="dck"><b>${k}</b><small>${kd}</small></div><div class="dctrack"><div class="fill bg-${state}" style="width:${Math.max(4,Math.round(pct*100))}%"></div></div><div class="dcn st-${state}">${num}</div></div>`;
 const st120=cfmaDef?"ok":cs120;
 const n120=cfmaDef?`${t("lg.day")} ${finalDay} · ${t("lg.stopped")}`:(left120>0?`${left120} ${t("lg.left")}`:t("lg.over"));
 const st240=cfmaDef?"ok":(d>240?"crit":(L.ext240?cs240:"mut"));
 const n240=cfmaDef?t("lg.stopped"):(left240>0?`${left240} ${t("lg.left")}`:t("lg.over"));
 // gate verdict
 let gate="";
 if(cfmaDef)gate=`<div class="verdict ok">${_icOK}<div><b>${t("lg.day")} ${finalDay}.</b> ${t("lg.gate.stopped")}</div></div>`;
 else if(d>240)gate=`<div class="verdict crit">${_icWarn}<div><b>PTD.</b> ${t("lg.ptd")}</div></div>`;
 else if(d>120&&!L.ext240)gate=`<div class="verdict crit">${_icWarn}<div>${t("lg.ext.need")}</div></div><button class="btn ghost mini" onclick="legExt240()">${_icOK}${t("lg.ext.btn")}</button>`;
 else if(L.ext240)gate=`<div class="verdict warn">${_icInfo}<div>${t("lg.ext.on")}</div></div>`;
 else gate=`<div class="verdict warn">${_icInfo}<div>${t("lg.within")}</div></div>`;

 // ---- CFMA panel ----
 let cfmaPanel;
 if(!hasCFMA){cfmaPanel=`<div class="empty">${t("lg.cfma.await")}</div>`;}
 else{
  const chk=`<div class="chk"><span>${t("lg.cfma.chk1")}</span><span>${t("lg.cfma.chk2")}</span><span>${t("lg.cfma.chk3")}</span><span>${t("lg.cfma.chk4")}</span></div>`;
  const verdict=cfmaDef
   ?`<div class="verdict ok">${_icOK}<div><b>${t("lg.cfma.def")}.</b> ${t("lg.cfma.defv")}${chk}</div></div>`
   :`<div class="verdict crit">${_icWarn}<div><b>${t("lg.cfma.int")}.</b> ${t("lg.cfma.intv")}</div></div>`;
  cfmaPanel=`
   <div class="doc"><div class="fi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2h8l4 4v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/><path d="M9 13l2 2 4-4"/></svg></div><div><div class="nm">${t("lg.cfma")}</div><div class="cd">MCL-MAR-POST-CFMA-2026-${("000000"+seq).slice(-6)}</div></div><div class="rt"><span class="nocopy">NO-COPY</span><span class="dmslink" onclick="openLegalDoc('CFMA')">${t("lg.cfma.view")} ▸</span></div></div>
   ${verdict}
   <button class="btn ghost mini" onclick="legCfmaToggle()">${cfmaDef?t("lg.cfma.mark.int"):t("lg.cfma.mark.def")}</button>`;
 }

 // ---- third-doctor windows ----
 let thirdPanel;
 if(!cfmaDef){thirdPanel=`<div class="empty">${t("lg.third.need")}</div>`;}
 else{
  // W1 signify — reasonable period (qualitative, no fixed statutory count)
  const w1done=L.contested;
  const w1=`<div class="win ${w1done?"done":"active"}"><div class="wn">${w1done?"✓":"1"}</div><div class="wb"><div class="wt">${t("lg.w1")} <span class="propflag rp">${t("lg.w1.rp")}</span></div><div class="wd">${t("lg.w1.d")}<br><span style="color:var(--coral-d)">${t("lg.consq.w1")}</span></div>${!w1done?`<button class="btn ghost mini" style="margin-top:8px" onclick="legContest()">${t("lg.w1.btn")}</button>`:""}</div><div class="wc">${w1done?`<span class="big st-ok">${t("lg.day")} ${L.contestDay}</span>${t("lg.done")}`:`<span class="big st-mut">${t("lg.w1.rp")}</span>`}</div></div>`;
  // WA employer assent — 10 days
  const wAdone=L.assented, wAactive=L.contested&&!L.assented, wAel=(wAdone?L.assentDay:d)-(L.contestDay!=null?L.contestDay:d), wAm=winMeta(Math.max(0,wAel),TD_SLA.assent);
  const wA=`<div class="win ${wAdone?"done":wAactive?"active":""}"><div class="wn">${wAdone?"✓":"2"}</div><div class="wb"><div class="wt">${t("lg.wA")} <span class="propflag">${t("lg.sla")} ${TD_SLA.assent}${t("lg.win.d")}</span></div><div class="wd">${t("lg.wA.d")}<br><span style="color:var(--coral-d)">${t("lg.consq.wA")}</span></div>${wAactive?`<button class="btn ghost mini" style="margin-top:8px" onclick="legAssent()">${t("lg.wA.btn")}</button>`:""}</div><div class="wc">${wAdone?`<span class="big st-ok">${t("lg.day")} ${L.assentDay}</span>${t("lg.done")}`:wAactive?`<span class="big st-${wAm.st}">${wAm.txt}</span>`:`<span class="big">—</span>`}</div></div>`;
  // W2 secure third doctor (mandatory conference) — 15 days
  const w2done=L.thirdAppointed, w2active=L.assented&&!L.thirdAppointed, w2el=(w2done?L.apptDay:d)-(L.assentDay!=null?L.assentDay:d), w2m=winMeta(Math.max(0,w2el),TD_SLA.secure);
  const w2=`<div class="win ${w2done?"done":w2active?"active":""}"><div class="wn">${w2done?"✓":"3"}</div><div class="wb"><div class="wt">${t("lg.w2")} <span class="propflag">${t("lg.sla")} ${TD_SLA.secure}${t("lg.win.d")}</span></div><div class="wd">${t("lg.w2.d")}<br><span style="color:var(--coral-d)">${t("lg.consq.w2")}</span></div>${w2active?`<button class="btn ghost mini" style="margin-top:8px" onclick="legAppoint()">${t("lg.w2.btn")}</button>`:""}</div><div class="wc">${w2done?`<span class="big st-ok">${t("lg.day")} ${L.apptDay}</span>${t("lg.done")}`:w2active?`<span class="big st-${w2m.st}">${w2m.txt}</span>`:`<span class="big">—</span>`}</div></div>`;
  // W3 reassessment — binding decision — 30 days
  const w3done=L.thirdDecided, w3active=L.thirdAppointed&&!L.thirdDecided, w3el=(w3done?L.decideDay:d)-(L.apptDay!=null?L.apptDay:d), w3m=winMeta(Math.max(0,w3el),TD_SLA.decision);

  const head=!L.contested?`<div class="verdict ok">${_icInfo}<div>${t("lg.third.default")}</div></div>`:"";
  const basis=`<div class="basis">${_icInfo}<div>${t("lg.third.basis")}</div></div>`;
  const vsheet=`<a class="vsheet" href="https://raw.githubusercontent.com/Apostolos-Bizou/next2mcl-mockups/main/verification/Next2PostMed_Legal_Verification_v1.xlsx" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>${t("lg.third.vsheet")}</a>`;
  thirdPanel=head+w1+wA+w2+w3+basis+vsheet;
 }

function financialTab(c){

 const est=estMid(c);

 const P=(icon,title,sub,body)=>`<div class="panel"><div class="ph"><span class="ic">${icon}</span><h3>${title}</h3>${sub?`<span class="rt">${sub}</span>`:""}</div><div class="pb">${body}</div></div>`;

 const icHand='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 11V4a1.5 1.5 0 0 1 3 0v7M9 11V6a1.5 1.5 0 0 1 3 0v5"/><path d="M6 12v-2a1.5 1.5 0 0 1 3 0v3M18 11a1.5 1.5 0 0 1 3 0v3a6 6 0 0 1-6 6h-3a6 6 0 0 1-5.2-3L4 15"/></svg>';

 const estPanel=`

  <div class="ftile"><span class="fl">${t("fn.actual")}</span><span class="fv">${money(act)}</span></div>
  <div class="ftile"><span class="fl">${t("fn.variance")}</span><span class="fv st-${vpct>10?"crit":vpct>0?"warn":"ok"}">${variance>=0?"+":""}${money(variance)} · ${vpct>=0?"+":""}${vpct}%</span></div>
  <div class="wd" style="margin-top:8px">${t("fn.est.note")}</div>`;

 const apprPanel=`
  <div class="ftile"><span class="fl">${t("fn.appr.owner")}</span><span class="fv st-${M.approved?"ok":"warn"}">${M.approved?t("fn.approved")+" ✓":t("fn.await")}</span></div>

 const sickPanel=`

 </div>`;
}

     <div class="rstamp"><div class="cd">${dms}</div><div class="rev">rev 1.0 · ${t("ld.esign")}</div></div>

function createCase(){
 const sf=$("#f_sf").value.trim(),vessel=$("#f_vessel").value.trim(),principal=$("#f_principal").value,complaint=$("#f_complaint").value.trim();
 if(!intakeChannel){toast(lang==='el'?"Διάλεξε κανάλι πρώτα":"Pick a channel first");return;}
 if(!sf||!vessel||!principal||!complaint){toast(lang==='el'?"Συμπλήρωσε τα υποχρεωτικά πεδία (*)":"Fill the required fields (*)");return;}
 const seq=String(61+CASES.filter(c=>c.seq>="0060").length).padStart(4,"0");
 const nc={id:"PM-2026-"+("000000"+seq).slice(-6),seq,sf:{n:sf,id:"SF-PH-04"+seq,age:38,rank:"AB"},principal,vessel,pi:"—",type:$("#f_type").value,sys:"MSK",dx:"—",arr:"2026-03-10",chan:intakeChannel,wr:"WR",stg:{med:0,leg:0,fin:0},hospital:null,status:"open"};
 CASES.unshift(nc);intakeChannel=null;openCase(nc.id);toast(t("toast.created"));
}

function statCard(k,v,s,acc){return `<div class="stat" style="border-left-color:${acc||'var(--signal)'}"><div class="sk">${k}</div><div class="sv">${v}</div>${s?`<div class="ss">${s}</div>`:''}</div>`;}
function deckTable(head,rows){return `<div class="dtable"><table><thead><tr>${head.map((h,i)=>`<th${i>0?' class="num"':''}>${h}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr${r.tot?' class="tot"':''}>${r.c.map((c,i)=>`<td${i>0?' class="num"':''}>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;}
function hbarList(items,accent){
 const mx=Math.max(...items.map(i=>i[1])),tot=items.reduce((a,i)=>a+i[1],0);
 const maxIdx=items.reduce((mi,it,i,ar)=>it[1]>ar[mi][1]?i:mi,0);
 return `<div class="freq">${items.map((it,idx)=>{
  const pct=Math.max(it[1]/mx*100,2.5),share=tot?Math.round(it[1]/tot*100):0,lead=idx===maxIdx;
  return `<div class="frow${lead?' lead':''}"><div class="flabel">${it[0]}</div><div class="ftrack"><div class="ffill" style="width:${pct.toFixed(1)}%;background:${lead?'linear-gradient(90deg,var(--signal),var(--coral-2))':accent||'var(--med)'}"></div></div><div class="fval">${it[1]}<span>${share}%</span></div></div>`;
 }).join("")}</div>`;
}
