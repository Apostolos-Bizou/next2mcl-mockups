<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Track a case · Next2PostMed (Mockup v0.1)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#071E33;--navy-2:#0B2A45;--teal:#0E8C93;--teal-2:#12A7AF;
  --gold:#E7A33E;--gold-2:#F2B860;--coral:#E5544B;--coral-2:#f0776f;--coral-d:#c73f37;
  --green:#2FA36B;--amber:#D9902A;--blue:#5B8DB8;--violet:#7B61A8;--violet-2:#9a7fc4;
  --mist:#EEF3F6;--paper:#FFFFFF;--ink:#152532;--ink-2:#4C6072;--ink-3:#8AA0B0;
  --line:#DCE6EC;--line-2:#EAF0F4;--radius:16px;--radius-sm:10px;
  --shadow:0 1px 2px rgba(7,30,51,.05),0 10px 30px rgba(7,30,51,.08);
  --ff-display:'Sora',system-ui,sans-serif;--ff-body:'Inter',system-ui,sans-serif;--ff-mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:var(--ff-body);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45;background:linear-gradient(160deg,#0B2A45,#061829 60%);min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}a{text-decoration:none;color:inherit}
:focus-visible{outline:2px solid var(--coral);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.mocktag{position:fixed;top:0;right:0;background:var(--coral);color:#fff;font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 9px;border-bottom-left-radius:8px;z-index:90;font-family:var(--ff-mono)}

.phone{max-width:440px;margin:0 auto;min-height:100vh;background:var(--mist);position:relative;box-shadow:0 0 60px rgba(0,0,0,.35)}
@media(min-width:490px){.phone{margin:22px auto;min-height:auto;border-radius:26px;overflow:hidden}}

.hero{background:linear-gradient(150deg,var(--navy),var(--navy-2) 68%,#123a5c);color:#EAF3F8;padding:16px 20px 20px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-40px;top:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(229,84,75,.22),transparent 68%);pointer-events:none}
.htop{display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.htop .mark{width:32px;height:32px}
.htop .wm{font-family:var(--ff-display);font-weight:700;font-size:16px;color:#fff;line-height:1}
.htop .wm b{color:var(--coral-2)}
.htop .clinic{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:#7EA2BC;margin-top:2px}
.langtog{margin-left:auto;display:inline-flex;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:8px;padding:2px}
.langtog button{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;color:#9FBBD0}
.langtog button.on{background:var(--coral);color:#fff}

/* hero tracker */
.htrk{position:relative;z-index:1;margin-top:14px;display:flex;gap:14px;align-items:center}
.htrk .prog{flex:0 0 auto}
.htrk .pinfo{flex:1;min-width:0}
.htrk .status{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7EA2BC;font-weight:600}
.htrk .now{font-family:var(--ff-display);font-weight:600;font-size:18px;color:#fff;margin-top:3px;line-height:1.2}
.htrk .sub{font-size:12px;color:#B9D3E4;margin-top:4px}
.refline{display:flex;align-items:center;gap:8px;margin-top:14px;position:relative;z-index:1;flex-wrap:wrap}
.refchip{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:6px 11px;font-family:var(--ff-mono);font-size:12px;color:#EAF3F8}
.refchip .l{color:#7EA2BC;font-size:9px;letter-spacing:.08em;text-transform:uppercase}
.sharebtn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;background:rgba(229,84,75,.16);border:1px solid rgba(229,84,75,.4);color:#f5b3ad;border-radius:9px;padding:6px 11px;font-size:11.5px;font-weight:600}
.sharebtn svg{width:13px;height:13px}

.body{padding:16px 18px 22px}

/* who card */
.who{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:13px 15px;margin-top:-28px;position:relative;z-index:2;display:flex;gap:12px;align-items:center}
.who .av{width:42px;height:42px;flex:0 0 42px;border-radius:11px;background:linear-gradient(135deg,var(--coral),var(--navy-2));color:#fff;display:grid;place-items:center;font-family:var(--ff-display);font-weight:700;font-size:15px}
.who .nm{font-family:var(--ff-display);font-weight:600;font-size:15px}
.who .mt{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.who .st{margin-left:auto;text-align:right}
.who .st .b{font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:999px;font-family:var(--ff-mono)}
.st-open{background:rgba(217,144,42,.15);color:var(--amber)}.st-legal{background:rgba(123,97,168,.15);color:var(--violet)}.st-closed{background:rgba(47,163,107,.14);color:var(--green)}

/* lens */
.lens{display:flex;gap:7px;margin-top:14px}
.lens button{flex:1;font-size:11.5px;font-weight:600;color:var(--ink-2);background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:3px}
.lens button .ic{width:16px;height:16px;color:var(--ink-3)}
.lens button.on{border-color:var(--coral);background:rgba(229,84,75,.05);color:var(--coral-d)}
.lens button.on .ic{color:var(--coral)}
.lenshint{font-size:10.5px;color:var(--ink-3);text-align:center;margin-top:7px}

/* now card */
.nowcard{background:linear-gradient(120deg,#fff,#fff);border:1px solid var(--line);border-left:4px solid var(--coral);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 16px;margin-top:16px}
.nowcard .lb{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--coral);font-weight:700}
.nowcard .cur{font-family:var(--ff-display);font-weight:600;font-size:16px;margin-top:5px}
.nowcard .det{font-size:12.5px;color:var(--ink-2);margin-top:4px}
.nowcard .nx{display:flex;align-items:center;gap:8px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line-2);font-size:12px;color:var(--ink-3)}
.nowcard .nx b{color:var(--ink-2)}
.nowcard .nx svg{width:14px;height:14px;color:var(--coral)}

/* clocks */
.clocks{display:flex;gap:9px;margin-top:14px}
.clk{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:11px 12px;display:flex;align-items:center;gap:10px}
.clk .ring{width:34px;height:34px;flex:0 0 34px}
.clk .lb{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.clk .vl{font-family:var(--ff-display);font-weight:700;font-size:15px;margin-top:1px}
.clk .vl small{font-size:10px;color:var(--ink-3);font-weight:500}

/* timeline */
.tl{margin-top:20px}
.tlh{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tlh h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin:0}
.tlh .cnt{margin-left:auto;font-family:var(--ff-mono);font-size:11px;color:var(--ink-3)}
.step{display:flex;gap:13px;position:relative}
.step .line{position:absolute;left:15px;top:30px;bottom:-4px;width:2px;background:var(--line)}
.step:last-child .line{display:none}
.step.done .line{background:var(--coral)}
.step.done.legal .line,.step.active.legal .line{background:var(--violet)}
.step .dot{width:32px;height:32px;flex:0 0 32px;border-radius:50%;background:var(--paper);border:2px solid var(--line);display:grid;place-items:center;z-index:1;color:var(--ink-3)}
.step .dot svg{width:15px;height:15px}
.step.done .dot{background:var(--coral);border-color:var(--coral);color:#fff}
.step.done.med .dot{background:var(--teal);border-color:var(--teal)}
.step.done.legal .dot{background:var(--violet);border-color:var(--violet)}
.step.active .dot{background:#fff;border-color:var(--coral);color:var(--coral);box-shadow:0 0 0 5px rgba(229,84,75,.16);animation:pulse 2.4s ease-in-out infinite}
.step.active.legal .dot{border-color:var(--violet);color:var(--violet);box-shadow:0 0 0 5px rgba(123,97,168,.16)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 5px rgba(229,84,75,.16)}50%{box-shadow:0 0 0 9px rgba(229,84,75,.04)}}
.step .c{padding-bottom:17px;flex:1;min-width:0}
.step .nm{font-size:13.5px;font-weight:600;line-height:1.3;display:flex;justify-content:space-between;gap:8px}
.step .when{font-family:var(--ff-mono);font-size:10.5px;font-weight:500;color:var(--ink-3);white-space:nowrap;flex:0 0 auto}
.step.pending .nm{color:var(--ink-3);font-weight:500}
.step .det{font-size:11.5px;color:var(--ink-2);margin-top:3px}
.step.pending .det{color:var(--ink-3)}
.step.active .when{color:var(--coral-d);font-weight:600}
.step .ph{display:inline-block;font-size:9px;font-weight:700;font-family:var(--ff-mono);padding:1px 6px;border-radius:5px;margin-top:5px;letter-spacing:.03em}
.ph-med{background:rgba(14,140,147,.12);color:var(--teal)}
.ph-adm{background:rgba(229,84,75,.11);color:var(--coral-d)}
.ph-leg{background:rgba(123,97,168,.14);color:var(--violet)}

/* tracks */
.tracks{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 15px;margin-top:18px}
.tracks h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin:0 0 12px}
.trow{margin-bottom:11px}.trow:last-child{margin-bottom:0}
.trow .tt{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;margin-bottom:5px}
.trow .tt .d{width:9px;height:9px;border-radius:3px}
.trow .tt .p{margin-left:auto;font-family:var(--ff-mono);font-size:10.5px;color:var(--ink-3);font-weight:500}
.trow .bar{height:8px;background:var(--mist);border-radius:5px;overflow:hidden}
.trow .fill{height:100%;border-radius:5px}

/* docs */
.docs{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 15px;margin-top:18px}
.docs h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin:0 0 11px}
.drow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line-2);font-size:12.5px}
.drow:last-child{border-bottom:none}
.drow .fi{width:28px;height:28px;flex:0 0 28px;border-radius:8px;background:var(--mist);display:grid;place-items:center;color:var(--navy-2)}
.drow .fi svg{width:14px;height:14px}
.drow .nm{font-weight:600}.drow .cd{font-family:var(--ff-mono);font-size:10px;color:var(--ink-3)}
.drow .rt{margin-left:auto;font-size:9px;font-weight:700;font-family:var(--ff-mono);color:var(--coral-d);background:rgba(229,84,75,.1);border:1px solid rgba(229,84,75,.28);padding:2px 6px;border-radius:5px}

.pnote{display:flex;gap:9px;align-items:flex-start;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 13px;margin-top:16px;font-size:11.5px;color:var(--ink-2);line-height:1.45}
.pnote svg{width:15px;height:15px;color:var(--coral);flex:0 0 15px;margin-top:1px}

/* demo advance */
.demo{display:flex;gap:8px;margin-top:16px}
.demo button{flex:1;padding:10px;border-radius:11px;font-family:var(--ff-display);font-weight:600;font-size:12.5px;border:1px dashed var(--line)}
.demo .adv{background:linear-gradient(100deg,var(--coral),var(--coral-d));color:#fff;border:none;box-shadow:0 6px 16px rgba(229,84,75,.26)}
.demo .adv:disabled{opacity:.45;box-shadow:none}
.demo .rw{color:var(--ink-3)}
.demotag{font-size:9.5px;color:var(--ink-3);text-align:center;margin-top:7px;font-family:var(--ff-mono)}

.foot{text-align:center;font-size:10.5px;color:var(--ink-3);margin-top:16px;line-height:1.6}
.foot b{color:var(--ink-2)}

/* picker */
.pick{padding:20px 18px}
.pick .lead{color:#EAF3F8}
.pcard{background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:13px 15px;margin-top:11px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:.14s}
.pcard:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(0,0,0,.12)}
.pcard .av{width:38px;height:38px;flex:0 0 38px;border-radius:10px;background:linear-gradient(135deg,var(--coral),var(--navy-2));color:#fff;display:grid;place-items:center;font-family:var(--ff-display);font-weight:700;font-size:13px}
.pcard .nm{font-weight:600;font-size:13.5px}
.pcard .mt{font-size:11px;color:var(--ink-3);margin-top:2px}
.pcard .go{margin-left:auto;color:var(--coral)}
.hide{display:none!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--navy);color:#fff;padding:11px 18px;border-radius:11px;font-size:12.5px;font-weight:500;z-index:80;transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

</div>

let lang="en", lens="seafarer", curId=null;

 {k:"opened",ph:"adm",day:0,i:"file",en:"Case opened",el:"Άνοιγμα υπόθεσης",den:"Referral received · Case ID assigned",del:"Ελήφθη referral · δόθηκε Case ID"},

 {k:"treatment",ph:"med",day:16,i:"pulse",en:"Treatment in progress",el:"Θεραπεία σε εξέλιξη",den:"Under active treatment · periodic updates",del:"Ενεργή θεραπεία · περιοδικές ενημερώσεις"},
 {k:"followup",ph:"med",day:45,i:"cal",en:"Follow-up reviews",el:"Follow-up επανεκτιμήσεις",den:"Structured progress reports to principal/P&I",del:"Δομημένες αναφορές προόδου σε principal/P&I"},
 {k:"final",ph:"med",day:95,i:"clip",en:"Final Medical Assessment",el:"Τελική ιατρική εκτίμηση",den:"CFMA issued by the treating physician",del:"Εκδόθηκε CFMA από τον θεράποντα ιατρό"},
 {k:"fitness",ph:"med",day:112,i:"award",en:"Fitness outcome",el:"Πόρισμα ικανότητας",den:"OUT",del:"OUT"},
 /* legal branch */
 {k:"contested",ph:"leg",day:120,i:"alert",en:"Assessment contested",el:"Αμφισβήτηση πορίσματος",den:"Seafarer's own physician gives a contrary opinion",del:"Ο ιδιώτης γιατρός του ναυτικού δίνει αντίθετη γνώμη"},
 {k:"req",ph:"leg",day:126,i:"scale",en:"Third-doctor referral requested",el:"Αίτημα για τρίτο γιατρό",den:"Written request sent · employer must reply ≤10 days",del:"Γραπτό αίτημα · ο εργοδότης απαντά ≤10 ημέρες"},
 {k:"third",ph:"leg",day:140,i:"users",en:"Third doctor appointed",el:"Ορισμός τρίτου γιατρού",den:"Jointly agreed · 15 days to secure, 30 to assess",del:"Από κοινού · 15 ημέρες ορισμός, 30 εκτίμηση"},
 {k:"binding",ph:"leg",day:170,i:"gavel",en:"Binding assessment / NLRC",el:"Δεσμευτικό πόρισμα / NLRC",den:"Third-doctor grade is final & binding — else NLRC",del:"Το grade του τρίτου γιατρού είναι δεσμευτικό — αλλιώς NLRC"}
];
const ICON={file:'<path d="M6 2h8l4 4v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/><path d="M14 2v4h4"/>',
 bell:'<path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/>',
 shield:'<path d="M12 3l8 4v6c0 4-3.5 7-8 8-4.5-1-8-4-8-8V7z"/><path d="M9 12l2 2 4-4"/>',
 hosp:'<path d="M3 21h18M6 21V7l6-4 6 4v14"/><path d="M12 9v6M9 12h6"/>',
 lab:'<path d="M9 3h6M10 3v6l-5 9a2 2 0 0 0 2 3h10a2 2 0 0 0 2-3l-5-9V3"/>',
 steth:'<path d="M6 3v5a4 4 0 0 0 8 0V3"/><path d="M10 15a6 6 0 0 0 6-6"/><circle cx="18" cy="8" r="2"/>',
 doc:'<path d="M6 2h8l4 4v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/><path d="M8 12h8M8 16h6"/>',
 pulse:'<path d="M3 12h4l2-6 4 12 2-6h6"/>',
 cal:'<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',
 clip:'<rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1M9 12l2 2 4-4"/>',
 award:'<circle cx="12" cy="9" r="5"/><path d="M9 13l-1 8 4-2 4 2-1-8"/>',
 alert:'<path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/>',
 scale:'<path d="M12 3v18M7 21h10M5 7h14M5 7l-3 6h6zM19 7l3 6h-6z"/>',
 users:'<circle cx="9" cy="8" r="3"/><path d="M2 21a7 7 0 0 1 14 0M16 6a3 3 0 0 1 0 6M22 21a7 7 0 0 0-5-6.7"/>',
 gavel:'<path d="M14 4l6 6M8 10l6 6M3 21h9M11 5l4 4-6 6-4-4z"/>'};

/* ---- cases (anonymized) ---- */
const CASES={
 "PM-2026-0044":{ab:"DS",n:"D. Sayat",rank:"3rd Engineer",vessel:"MV Amphion",principal:"Poseidon Lines",pi:"Pacific Handlers",sys:"MSK",dx:"Bucket-handle meniscal tear, knee",arr:"2026-01-08",hospital:"Singapore Maritime Hospital",mi:5,status:"open",out:"ftw"},
 "PM-2026-0042":{ab:"ER",n:"E. Ramos",rank:"Oiler",vessel:"MV Northern Grace",principal:"Halcyon Shipmanagement",pi:"Manila P&I Corr.",sys:"GI",dx:"Erosive gastritis, H. pylori +",arr:"2026-01-02",hospital:"Bayview Marine Clinic",mi:4,status:"open",out:"ftw"},
 "PM-2026-0047":{ab:"JP",n:"J. Piornato",rank:"Bosun",vessel:"MV Star Pioneer",principal:"Orion Bulkers",pi:"Manila P&I Corr.",sys:"CV",dx:"Cerebrovascular disease, infarct",arr:"2026-01-14",hospital:"Bayview Marine Clinic",mi:6,status:"open",out:"rep"},
 "PM-2026-0051":{ab:"RM",n:"R. Melecio",rank:"OS",vessel:"MV Sea Verity",principal:"Kestrel Shipping",pi:"Del Rio Corr.",sys:"GI",dx:"Fistula-in-ano, s/p fistulotomy",arr:"2026-01-07",hospital:"Bayview Marine Clinic",mi:9,status:"open",out:"ftw"},
 "PM-2026-0039":{ab:"KT",n:"K. Trabado",rank:"Deck Cadet",vessel:"MV Blue Horizon",principal:"Meridian Marine",pi:"—",sys:"INTG",dx:"Atopic dermatitis, generalized",arr:"2025-12-28",hospital:"Manila Seafarers Medical",mi:8,status:"open",out:"ftw"},
 "PM-2026-0033":{ab:"AM",n:"A. Montives",rank:"AB",vessel:"MT Great Meridian",principal:"Cyan Maritime",pi:"Pacific Handlers",sys:"MSK",dx:"Open fx, proximal phalanx, L index",arr:"2025-11-30",hospital:"Singapore Maritime Hospital",mi:12,status:"legal",out:"unfit"}
};
const TODAY=new Date("2026-03-12");
function journeyLen(c){return c.status==="legal"?M.length:11;}
function daysSince(d){return Math.round((TODAY-new Date(d))/864e5);}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function fmtDate(d){return d.toLocaleDateString(lang==="el"?"el-GR":"en-GB",{day:"2-digit",month:"short"});}
function ring(pct,color,size){const r=size/2-3,c=2*Math.PI*r,off=c*(1-pct);return `<svg class="ring" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e6edf2" stroke-width="3"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/></svg>`;}
function ringLabel(pct,color,size,label){const r=size/2-4,c=2*Math.PI*r,off=c*(1-pct);return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="4"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/><text x="${size/2}" y="${size/2+1}" text-anchor="middle" font-family="Sora" font-weight="700" font-size="15" fill="#fff">${label}</text><text x="${size/2}" y="${size/2+13}" text-anchor="middle" font-family="Inter" font-size="7.5" fill="#9FBBD0">done</text></svg>`;}

function detail(m,c){
 if(m.k==="admitted")return c.hospital;
 if(m.k==="tests")return (TESTS[c.sys]||TESTS._)[lang];
 if(m.k==="specialist")return (SPEC[c.sys]||{en:"Specialist",el:"Ειδικός"})[lang]+" · "+(lang==="el"?"εκτίμηση & γνώμη":"assessment & opinion");
 if(m.k==="fitness")return t("out_"+c.out);
 return lang==="el"?m.del:m.den;
}

/* ---- render ---- */
function readParam(){const p=new URLSearchParams(location.search).get("case");if(p&&CASES[p])curId=p;}
function render(){
 if(!curId){renderPicker();return;}
 renderTracker();
}
function renderPicker(){
 $("#heroBody").innerHTML=`<div class="htrk" style="margin-top:16px"><div class="pinfo"><div class="now">${t("pick")}</div><div class="sub">${t("picksub")}</div></div></div>`;
 $("#body").innerHTML=`<div style="height:6px"></div>`+Object.entries(CASES).map(([id,c])=>`
   <div class="pcard" onclick="openCase('${id}')">
     <div class="av">${c.ab}</div>
     <div><div class="nm">${c.n} · ${c.rank}</div><div class="mt">${id} · ${c.principal} · ${c.vessel}</div></div>
     <div class="go"><svg viewBox="0 0 24 24" width="18" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 6l6 6-6 6"/></svg></div>
   </div>`).join("");
}
function openCase(id){curId=id;history.replaceState(null,"",location.pathname+"?case="+id);render();}

function renderTracker(){
 const c=CASES[curId],jl=journeyLen(c),d=daysSince(c.arr);
 const cur=M[c.mi],curLabel=lang==="el"?cur.el:cur.en;
 const nxt=c.mi+1<jl?M[c.mi+1]:null;
 const pct=Math.round((c.mi/(jl-1))*100);
 const stItem=c.status==="legal"?"st-legal":c.status==="closed"?"st-closed":"st-open";
 const stTxt=c.status==="legal"?"POME→Legal":c.status==="closed"?"Closed":(lang==="el"?"Ανοιχτή":"Open");
 // hero
 $("#heroBody").innerHTML=`
   <div class="htrk">
     <div class="prog">${ringLabel(c.mi/(jl-1),"#f0776f",62,pct+"%")}</div>
     <div class="pinfo">
       <div class="status">${t("status")}</div>
       <div class="now">${curLabel}</div>
       <div class="sub">${detail(cur,c)}</div>
     </div>
   </div>
   <div class="refline">
     <span class="refchip"><span class="l">Case</span>${curId}</span>
     <button class="sharebtn" onclick="shareLink()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>${t("share")}</button>
   </div>`;
 // body
 const showClin=lens!=="seafarer";
 const showLegalFin=lens==="pi"||lens==="principal";
 let html=`
   <div class="who">
     <div class="av">${c.ab}</div>
     <div><div class="nm">${c.n}</div><div class="mt">${c.rank} · ${c.vessel} · ${c.principal}</div></div>
     <div class="st"><span class="b ${stItem}">${stTxt}</span></div>
   </div>

   <div class="lens">
     <button class="${lens==="seafarer"?"on":""}" onclick="setLens('seafarer')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>${t("lseaf")}</button>
     <button class="${lens==="principal"?"on":""}" onclick="setLens('principal')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 21h18M5 21V8l7-4 7 4v13"/><path d="M9 21v-5h6v5"/></svg>${t("lprin")}</button>
     <button class="${lens==="pi"?"on":""}" onclick="setLens('pi')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M12 3l8 4v6c0 4-3.5 7-8 8-4.5-1-8-4-8-8V7z"/></svg>${t("lpi")}</button>
   </div>
   <div class="lenshint">${t("lhint_"+lens)}</div>

   <div class="nowcard">
     <div class="lb">${t("status")}</div>
     <div class="cur">${curLabel}</div>
     <div class="det">${detail(cur,c)}</div>
     <div class="nx"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg><span><b>${t("next")}:</b> ${nxt?(lang==="el"?nxt.el:nxt.en):t("nx_none")}</span></div>
   </div>`;

 if(showClin){
   const cs120=(120-d)<=15?"#c73f37":(120-d)<=45?"#D9902A":"#2FA36B";
   html+=`<div class="clocks">
     <div class="clk">${ring(Math.min(d/120,1),cs120,34)}<div><div class="lb">${t("clk120")}</div><div class="vl">${Math.max(120-d,0)} <small>${t("left")}</small></div></div></div>
     <div class="clk">${ring(Math.min(d/240,1),"#8AA0B0",34)}<div><div class="lb">${t("clk240")}</div><div class="vl">${Math.max(240-d,0)} <small>${t("left")}</small></div></div></div>
   </div>`;
 }

 // timeline
 html+=`<div class="tl"><div class="tlh"><h3>${t("tl")}</h3><span class="cnt">${c.mi} / ${jl-1} ${t("done")}</span></div>`;
 for(let i=0;i<jl;i++){
   const m=M[i];const state=i<c.mi?"done":i===c.mi?"active":"pending";
   const phc=m.ph==="med"?"med":m.ph==="leg"?"legal":"";
   const when=i<c.mi?fmtDate(addDays(c.arr,m.day)):i===c.mi?(lang==="el"?"σε εξέλιξη":"in progress"):"—";
   const phLabel=m.ph==="med"?"MEDICAL":m.ph==="leg"?"LEGAL":"ADMIN";
   const phCls=m.ph==="med"?"ph-med":m.ph==="leg"?"ph-leg":"ph-adm";
   const showPh=(state!=="pending");
   html+=`<div class="step ${state} ${phc}">
     <div class="dot">${state==="done"?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5 9-11"/></svg>':`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">${ICON[m.i]}</svg>`}<div class="line"></div></div>
     <div class="c">
       <div class="nm"><span>${lang==="el"?m.el:m.en}</span><span class="when">${when}</span></div>
       <div class="det">${detail(m,c)}</div>
       ${showPh?`<span class="ph ${phCls}">${phLabel}</span>`:""}
     </div>
   </div>`;
 }
 html+=`</div>`;

 // tracks (clinical lens)
 if(showClin){
   const medP=Math.min(Math.round((Math.min(c.mi,10)/10)*100),100);
   const legP=c.status==="legal"?Math.round(((c.mi-10)/(M.length-1-10))*100):(d>=1?12:0);
   const finP=c.mi>=6?60:c.mi>=3?38:c.mi>=2?18:0;
   html+=`<div class="tracks"><h3>${t("trk")}</h3>
     <div class="trow"><div class="tt"><span class="d" style="background:var(--teal)"></span>${t("trmed")}<span class="p">${medP}%</span></div><div class="bar"><span class="fill" style="width:${medP}%;background:var(--teal)"></span></div></div>
     <div class="trow"><div class="tt"><span class="d" style="background:var(--amber)"></span>${t("trleg")}<span class="p">${Math.max(legP,0)}%</span></div><div class="bar"><span class="fill" style="width:${Math.max(legP,0)}%;background:var(--amber)"></span></div></div>
     ${showLegalFin?`<div class="trow"><div class="tt"><span class="d" style="background:var(--green)"></span>${t("trfin")}<span class="p">${finP}%</span></div><div class="bar"><span class="fill" style="width:${finP}%;background:var(--green)"></span></div></div>`:""}
   </div>`;
 }

 // documents (principal/pi)
 if(showLegalFin){
   const seq=curId.slice(-4);
   const docs=[["Medical Referral","MEDR"],["Guarantee of Payment","GOP"],["Initial Medical Report","IMR"]];
   if(c.mi>=9)docs.push(["Final Medical Assessment","CFMA"]);
   if(c.status==="legal")docs.push(["Third-doctor request","3DR"]);
   html+=`<div class="docs"><h3>${t("docs")}</h3>${docs.map(dd=>`<div class="drow"><div class="fi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2h8l4 4v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/></svg></div><div><div class="nm">${dd[0]}</div><div class="cd">MCL-POST-MNL-${dd[1]}-2026-${seq}</div></div><span class="rt">${t("nocopy")}</span></div>`).join("")}</div>`;
 }

 html+=`<div class="pnote"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l8 4v6c0 4-3.5 7-8 8-4.5-1-8-4-8-8V7z"/><path d="M9 12l2 2 4-4"/></svg>${t("note")}</div>

   <div class="demo">
     <button class="rw" onclick="stepCase(-1)">◂ ${t("rewind")}</button>
     <button class="adv" onclick="stepCase(1)" ${c.mi>=jl-1?"disabled":""}>${t("demo")} ▸</button>
   </div>
   <div class="demotag">${t("demotag")}</div>

   <div class="foot"><b>${t("foot1")}</b><br>${t("updated")}: ${fmtDate(TODAY)} · ${t("foot2")}</div>`;
 $("#body").innerHTML=html;
}
function setLens(l){lens=l;renderTracker();}
function stepCase(dir){const c=CASES[curId];const jl=journeyLen(c);c.mi=Math.max(0,Math.min(jl-1,c.mi+dir));renderTracker();}
function shareLink(){const url=location.origin+location.pathname+"?case="+curId;(navigator.clipboard&&navigator.clipboard.writeText(url).catch(()=>{}));toast(t("shared"));}
let toTid;function toast(m){const el=$("#toast");el.textContent=m;el.classList.add("show");clearTimeout(toTid);toTid=setTimeout(()=>el.classList.remove("show"),2000);}

$("#langTog").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;lang=b.dataset.lang;[...$("#langTog").children].forEach(x=>x.classList.toggle("on",x===b));$("[data-i18n='brand']")&&($("[data-i18n='brand']").textContent=t("brand"));render();});

readParam();render();
</script>
